name: Build presenty.zip for Claude.ai uploads

on:
  push:
    branches: [main]
    paths: ['skills/presenty/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build zip (skill folder at zip root, as Claude.ai expects)
        run: |
          cd skills
          zip -r ../presenty.zip presenty
      - name: Publish/refresh "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest --title "Latest skill build" \
              --notes "Auto-built presenty.zip for Claude.ai skill upload. Always current with main."
          gh release upload latest presenty.zip --clobber
